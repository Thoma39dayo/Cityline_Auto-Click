<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0f1118;
      --panel: rgba(20, 24, 36, 0.96);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #ecf1ff;
      --muted: #b3bdd8;
      --green: #00c853;
      --green-2: #00b84d;
      --blue: #2f7eea;
      --blue-2: #236ad1;
      --red: #f4384a;
      --red-2: #d82436;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      width: 360px;
      margin: 0;
      padding: 14px;
      font-family: "SF Pro Text", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 300px at 20% -20%, rgba(0, 200, 83, 0.22), transparent 45%),
        radial-gradient(900px 260px at 120% 0%, rgba(47, 126, 234, 0.2), transparent 40%),
        var(--bg);
    }

    .card {
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      text-align: center;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #ff5c6b;
      text-shadow: 0 0 16px rgba(255, 92, 107, 0.25);
    }

    .sub {
      margin-top: 4px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      font-size: 13px;
      line-height: 1.45;
      color: #f3f7ff;
    }

    .btns {
      margin-top: 12px;
      display: grid;
      gap: 9px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      padding: 12px 10px;
      color: #fff;
      transition: transform .08s ease, filter .12s ease, box-shadow .12s ease;
    }

    button:hover { filter: brightness(1.03); }
    button:active { transform: translateY(1px) scale(0.995); }

    .toggle {
      background: linear-gradient(180deg, var(--green), var(--green-2));
      box-shadow: 0 8px 18px rgba(0, 200, 83, 0.3);
    }

    .open {
      background: linear-gradient(180deg, var(--blue), var(--blue-2));
      box-shadow: 0 8px 18px rgba(47, 126, 234, 0.28);
    }


    .help {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      line-height: 1.58;
      color: #cfd8f3;
    }

    .help strong {
      color: #ffffff;
      font-size: 12.5px;
    }

    .dot {
      color: #7cff9d;
      font-weight: 900;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏎️ Cityline Ultra-Fast</h1>
    <div class="sub">Fast monitor + auto click</div>

    <div class="status" id="status">讀取中...</div>

    <div class="btns">
      <button class="toggle" id="toggle">切換測試模式</button>
      <button class="open" id="openPageBtn">開啟指定活動頁</button>
    </div>

    <div class="help">
      <strong>說明</strong><br>
      <span class="dot">•</span>測試模式 ON：倒數 10 秒後顯示「前　往　購　票」測試按鈕<br>
      <span class="dot">•</span>測試模式 OFF：僅監控真實按鈕，不插入測試按鈕
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
